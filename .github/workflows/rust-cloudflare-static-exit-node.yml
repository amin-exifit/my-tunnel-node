name: "rust-cloudflare-static-exit-node"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Start Node
        run: |
          docker run -d --name mhrv-tunnel \
            -p 8080:8080 \
            -e TUNNEL_AUTH_KEY="${{ secrets.TUNNEL_AUTH_KEY }}" \
            ghcr.io/therealaleph/mhrv-tunnel-node:latest
          sleep 5
          for i in {1..5}; do
            if curl -s http://localhost:8080/health; then
              echo "Tunnel node healthy"
              break
            fi
            sleep 3
          done

      - name: Download cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Run
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          ./cloudflared tunnel run --token "$CF_TUNNEL_TOKEN" > /tmp/tunnel.log 2>&1 &
          sleep 10
          while true; do
            sleep 3600
            echo "[$(date -u)] running!"
          done

      - name: Cleanup
        if: always()
        run: |
          docker stop mhrv-tunnel || true
          pkill cloudflared || true
