name: "vps-cloudflared"

on:
  workflow_dispatch:

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Download cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Start exit node in background
        env:
          EXIT_NODE_PSK: ${{ secrets.EXIT_NODE_PSK }}
        run: |
          python3 vps_exit_node.py --host 127.0.0.1 --port 8181 &
          sleep 2

      - name: Expose via Cloudflare Tunnel (random URL)
        run: |
          ./cloudflared tunnel --url http://127.0.0.1:8181 > /tmp/tunnel.log 2>&1 &
          sleep 10
          PUBLIC_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          echo "$PUBLIC_URL" > /tmp/public_url.txt
          echo "--------------------------------------------------"
          echo "🌐 Exit node live at: $PUBLIC_URL"
          echo "Use this URL in your client config.json:"
          echo '  "url": "'"$PUBLIC_URL"'",'
          echo "--------------------------------------------------"

      - name: running
        run: |
          PUBLIC_URL=$(cat /tmp/public_url.txt)
          echo "=================================================="
          echo "  running perfectly!"
          echo "  $PUBLIC_URL"
          echo "=================================================="
          # Remind every hour (optional)
          while true; do
            sleep 3600
            echo "[$(date)] Still alive → $PUBLIC_URL"
          done
